
<style>
#erd { width: 100%; overflow-x: auto; }
#erd svg { min-width: 900px; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
    AspNetUsers {
        string Id PK
        string Email
        string FirstName
        string LastName
        string Role
    }
    Trainees {
        int Id PK
        string UserId FK
        string TraineePublicId
        string Phone
        date DateOfBirth
    }
    Instructors {
        int Id PK
        string UserId FK
        string Bio
    }
    InstructorAvailability {
        int Id PK
        int InstructorId FK
        int DayOfWeek
        time StartTime
        time EndTime
    }
    CourseCategories {
        int Id PK
        string Name
        string Description
    }
    Courses {
        int Id PK
        int CategoryId FK
        int PrerequisiteCourseId FK
        string Title
        int DurationHours
        int Capacity
        decimal EnrollmentFee
    }
    Classrooms {
        int Id PK
        string Name
        int Capacity
    }
    ClassroomEquipment {
        int Id PK
        int ClassroomId FK
        string EquipmentName
    }
    CourseSessions {
        int Id PK
        int CourseId FK
        int InstructorId FK
        int ClassroomId FK
        datetime StartDateTime
        datetime EndDateTime
        int Capacity
        string Status
    }
    Enrollments {
        int Id PK
        int TraineeId FK
        int CourseSessionId FK
        string Status
        datetime EnrolledAt
    }
    Assessments {
        int Id PK
        int EnrollmentId FK
        string Result
        string Notes
        datetime RecordedAt
        int RecordedById FK
    }
    CertificationTracks {
        int Id PK
        string Name
        string Description
        string CertRefPrefix
    }
    CertificationTrackCourses {
        int CertificationTrackId FK
        int CourseId FK
        bool IsRequired
    }
    TraineeCertifications {
        int Id PK
        int TraineeId FK
        int CertificationTrackId FK
        string Status
        string CertRefNumber
        datetime IssuedAt
    }
    Payments {
        int Id PK
        int EnrollmentId FK
        decimal AmountPaid
        datetime PaidAt
        decimal OutstandingBalance
    }
    Notifications {
        int Id PK
        string UserId FK
        string Message
        bool IsRead
        datetime CreatedAt
        string Type
    }

    AspNetUsers ||--o| Trainees : "has profile"
    AspNetUsers ||--o| Instructors : "has profile"
    AspNetUsers ||--o{ Notifications : "receives"
    Instructors ||--o{ InstructorAvailability : "has"
    CourseCategories ||--o{ Courses : "categorizes"
    Courses ||--o| Courses : "prerequisite for"
    Classrooms ||--o{ ClassroomEquipment : "has"
    Courses ||--o{ CourseSessions : "scheduled as"
    Instructors ||--o{ CourseSessions : "teaches"
    Classrooms ||--o{ CourseSessions : "hosts"
    Trainees ||--o{ Enrollments : "enrolls in"
    CourseSessions ||--o{ Enrollments : "has"
    Enrollments ||--o| Assessments : "results in"
    Enrollments ||--o{ Payments : "paid via"
    CertificationTracks ||--o{ CertificationTrackCourses : "includes"
    Courses ||--o{ CertificationTrackCourses : "part of"
    Trainees ||--o{ TraineeCertifications : "earns"
    CertificationTracks ||--o{ TraineeCertifications : "awarded via"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
